server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Dynamic DNS resolution — re-resolves if sentinel-api restarts with a new IP
    resolver 127.0.0.11 valid=30s;
    set $sentinel_api http://sentinel-api:8010;

    # SPA: serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Allow large CSV uploads (up to 50MB)
    client_max_body_size 50m;

    # Proxy API requests to sentinel-api
    location /api/ {
        proxy_pass $sentinel_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # Proxy health/version endpoints
    location ~ ^/(healthz|readyz|version)$ {
        proxy_pass $sentinel_api;
    }
}
