# ONE-TIME: Rebuild sentinel-api for v2.5.0
# Delete this workflow after use.
name: Build sentinel-api

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ vars.IMAGE_PREFIX || format('{0}/es1-platform', github.repository_owner) }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout v2.5.0
        uses: actions/checkout@v4
        with:
          ref: v2.5.0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push sentinel-api
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
        run: |
          TAG="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/sentinel-api:v2.5.0"
          echo "Building sentinel-api from services/sentinel/backend"
          docker build \
            --platform linux/amd64 \
            --label "org.opencontainers.image.version=v2.5.0" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            -t "${TAG}" \
            -f "services/sentinel/backend/Dockerfile" \
            "services/sentinel/backend"
          docker push "${TAG}"
          echo "Pushed ${TAG}"
