# ES1 Platform -- Release Images
#
# Builds a complete, self-contained set of images for a release version.
# Each version is independent -- no tag pointers to other versions.
# Only two versions are kept on GHCR: current and previous.
#
# Trigger: Manual only (workflow_dispatch)
#
# Image lists are driven by release-config.yaml — no hardcoded lists here.
# Adding a new service = adding an entry in release-config.yaml.
#
# Image types:
#   Custom    -- built from source when code changes, copied forward when not
#   Upstream  -- pulled from public registries when source tag changes,
#                copied forward when not
#
# Result: All images on GHCR, each verified as clean single-arch amd64.
# Note: kube-state-metrics is pulled directly from registry.k8s.io during deployment.

name: Release Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v2.5.0). Must be a git tag.'
        required: true
        type: string
      force_rebuild_all:
        description: 'Force rebuild/re-pull ALL images (ignore change detection)'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ vars.IMAGE_PREFIX || format('{0}/es1-platform', github.repository_owner) }}

jobs:
  # ===========================================================================
  # Step 1: Detect what changed (data-driven from release-config.yaml)
  # ===========================================================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.config.outputs.version }}
      prev_version: ${{ steps.config.outputs.prev_version }}
      registry: ${{ steps.config.outputs.registry }}
      custom_changed: ${{ steps.changes.outputs.custom_changed }}
      upstream_changed: ${{ steps.changes.outputs.upstream_changed }}
      all_unchanged: ${{ steps.changes.outputs.all_unchanged }}
      has_custom_changed: ${{ steps.changes.outputs.has_custom_changed }}
      has_upstream_changed: ${{ steps.changes.outputs.has_upstream_changed }}
      has_unchanged: ${{ steps.changes.outputs.has_unchanged }}
      all_images: ${{ steps.changes.outputs.all_images }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate inputs
        run: |
          VERSION="${{ inputs.version }}"
          if ! git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag '$VERSION' does not exist. Create the tag first."
            exit 1
          fi

      - name: Install tools
        run: |
          # Install yq (pinned)
          YQ_VERSION=4.44.1
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Configure versions
        id: config
        run: |
          VERSION="${{ inputs.version }}"
          REGISTRY="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}"

          # Find the previous version from GHCR (not git tags).
          REFERENCE="${REGISTRY}/platform-manager-api"
          GHCR_TAGS=$(crane ls "$REFERENCE" 2>/dev/null | grep '^v' | sort -V || true)
          PREV=""
          for TAG in $GHCR_TAGS; do
            if [[ "$TAG" != "$VERSION" ]]; then
              PREV="$TAG"
            fi
          done

          if [[ -z "$PREV" ]]; then
            echo "::warning::No previous version found in GHCR. All images will be built/pulled fresh."
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "prev_version=$PREV" >> $GITHUB_OUTPUT
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT

          echo "## Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Previous (GHCR) | \`${PREV:-none}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | \`$REGISTRY\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Force rebuild | ${{ inputs.force_rebuild_all }} |" >> $GITHUB_STEP_SUMMARY

      - name: Detect changes
        id: changes
        run: |
          VERSION="${{ inputs.version }}"
          PREV="${{ steps.config.outputs.prev_version }}"
          FORCE="${{ inputs.force_rebuild_all }}"
          CONFIG="release-config.yaml"

          # --- Read custom images from release-config.yaml ---
          CUSTOM_COUNT=$(yq '.custom_images | length' "$CONFIG")
          CUSTOM_CHANGED="[]"
          CUSTOM_UNCHANGED="[]"

          for i in $(seq 0 $((CUSTOM_COUNT - 1))); do
            NAME=$(yq ".custom_images[$i].name" "$CONFIG")
            CONTEXT=$(yq ".custom_images[$i].context" "$CONFIG")

            if [[ "$FORCE" == "true" || -z "$PREV" ]]; then
              CUSTOM_CHANGED=$(echo "$CUSTOM_CHANGED" | jq -c ". + [{\"name\": \"$NAME\", \"context\": \"$CONTEXT\"}]")
            else
              DIFF=$(git diff --name-only "$PREV..$VERSION" -- "$CONTEXT" | wc -l | tr -d ' ')
              if [[ "$DIFF" -gt 0 ]]; then
                echo "  CHANGED: $NAME ($DIFF files)"
                CUSTOM_CHANGED=$(echo "$CUSTOM_CHANGED" | jq -c ". + [{\"name\": \"$NAME\", \"context\": \"$CONTEXT\"}]")
              else
                echo "  unchanged: $NAME"
                CUSTOM_UNCHANGED=$(echo "$CUSTOM_UNCHANGED" | jq -c ". + [{\"name\": \"$NAME\"}]")
              fi
            fi
          done

          # --- Read upstream images from release-config.yaml ---
          UPSTREAM_COUNT=$(yq '.upstream_images | length' "$CONFIG")
          UPSTREAM_CHANGED="[]"
          UPSTREAM_UNCHANGED="[]"

          if [[ "$FORCE" == "true" || -z "$PREV" ]]; then
            # Force: pull everything fresh from release-config.yaml
            for i in $(seq 0 $((UPSTREAM_COUNT - 1))); do
              NAME=$(yq ".upstream_images[$i].name" "$CONFIG")
              SOURCE=$(yq ".upstream_images[$i].source" "$CONFIG")
              UPSTREAM_CHANGED=$(echo "$UPSTREAM_CHANGED" | jq -c ". + [{\"name\": \"$NAME\", \"source\": \"$SOURCE\"}]")
            done
          else
            # Compare release-config.yaml between versions
            PREV_CONFIG=$(git show "$PREV:release-config.yaml" 2>/dev/null || echo "")

            for i in $(seq 0 $((UPSTREAM_COUNT - 1))); do
              NAME=$(yq ".upstream_images[$i].name" "$CONFIG")
              SOURCE=$(yq ".upstream_images[$i].source" "$CONFIG")

              if [[ -z "$PREV_CONFIG" ]]; then
                # No previous release-config.yaml — treat all as changed
                UPSTREAM_CHANGED=$(echo "$UPSTREAM_CHANGED" | jq -c ". + [{\"name\": \"$NAME\", \"source\": \"$SOURCE\"}]")
              else
                PREV_SOURCE=$(echo "$PREV_CONFIG" | yq ".upstream_images[] | select(.name == \"$NAME\") | .source // \"\"")
                if [[ "$SOURCE" != "$PREV_SOURCE" ]]; then
                  echo "  CHANGED upstream: $NAME ($PREV_SOURCE -> $SOURCE)"
                  UPSTREAM_CHANGED=$(echo "$UPSTREAM_CHANGED" | jq -c ". + [{\"name\": \"$NAME\", \"source\": \"$SOURCE\"}]")
                else
                  echo "  unchanged upstream: $NAME"
                  UPSTREAM_UNCHANGED=$(echo "$UPSTREAM_UNCHANGED" | jq -c ". + [{\"name\": \"$NAME\"}]")
                fi
              fi
            done
          fi

          # Merge all unchanged into one array for a single copy job
          ALL_UNCHANGED=$(jq -cn --argjson a "$CUSTOM_UNCHANGED" --argjson b "$UPSTREAM_UNCHANGED" '$a + $b')

          # Build complete image name list from release-config.yaml (for verify/cleanup/save-manifest)
          ALL_IMAGES=$(yq -o=json '[.custom_images[].name, .upstream_images[].name]' "$CONFIG" | jq -c '.')

          # Output matrices
          echo "custom_changed={\"include\":$CUSTOM_CHANGED}" >> $GITHUB_OUTPUT
          echo "upstream_changed={\"include\":$UPSTREAM_CHANGED}" >> $GITHUB_OUTPUT
          echo "all_unchanged={\"include\":$ALL_UNCHANGED}" >> $GITHUB_OUTPUT
          echo "all_images=$ALL_IMAGES" >> $GITHUB_OUTPUT

          CC=$(echo "$CUSTOM_CHANGED" | jq length)
          CU=$(echo "$CUSTOM_UNCHANGED" | jq length)
          UC=$(echo "$UPSTREAM_CHANGED" | jq length)
          UU=$(echo "$UPSTREAM_UNCHANGED" | jq length)
          AU=$(echo "$ALL_UNCHANGED" | jq length)

          echo "has_custom_changed=$( [[ $CC -gt 0 ]] && echo true || echo false )" >> $GITHUB_OUTPUT
          echo "has_upstream_changed=$( [[ $UC -gt 0 ]] && echo true || echo false )" >> $GITHUB_OUTPUT
          echo "has_unchanged=$( [[ $AU -gt 0 ]] && echo true || echo false )" >> $GITHUB_OUTPUT

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Changes Detected" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Changed | Unchanged |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|---------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Custom images | $CC | $CU |" >> $GITHUB_STEP_SUMMARY
          echo "| Upstream images | $UC | $UU |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total images** | **$((CC + UC))** | **$((CU + UU))** |" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Step 2: Build changed custom images
  # ===========================================================================
  build-custom:
    name: Build ${{ matrix.name }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has_custom_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.custom_changed) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect-changes.outputs.version }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
        run: |
          REGISTRY="${{ needs.detect-changes.outputs.registry }}"
          NAME="${{ matrix.name }}"
          VERSION="${{ needs.detect-changes.outputs.version }}"
          CONTEXT="${{ matrix.context }}"
          TAG="${REGISTRY}/${NAME}:${VERSION}"

          echo "Building ${NAME} from ${CONTEXT}"
          docker build \
            --platform linux/amd64 \
            --label "org.opencontainers.image.version=${VERSION}" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            -t "${TAG}" \
            -f "${CONTEXT}/Dockerfile" \
            "${CONTEXT}"

          docker push "${TAG}"
          echo "Pushed ${TAG}"

  # ===========================================================================
  # Step 3: Pull changed upstream images from public registries
  # ===========================================================================
  pull-upstream:
    name: Pull ${{ matrix.name }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has_upstream_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.upstream_changed) }}
    steps:
      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy from public registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u "${{ github.actor }}" --password-stdin

          REGISTRY="${{ needs.detect-changes.outputs.registry }}"
          NAME="${{ matrix.name }}"
          SOURCE="${{ matrix.source }}"
          VERSION="${{ needs.detect-changes.outputs.version }}"
          TARGET="${REGISTRY}/${NAME}:${VERSION}"

          echo "Copying ${SOURCE} -> ${TARGET} (amd64 only)"
          if crane copy --platform linux/amd64 "${SOURCE}" "${TARGET}"; then
            echo "Done (crane): ${TARGET}"
          else
            echo "crane failed, falling back to docker pull/tag/push..."
            docker pull --platform linux/amd64 "${SOURCE}"
            docker tag "${SOURCE}" "${TARGET}"
            docker push "${TARGET}"
            echo "Done (docker): ${TARGET}"
          fi

  # ===========================================================================
  # Step 4: Copy ALL unchanged images from previous version
  # ===========================================================================
  copy-unchanged:
    name: Copy ${{ matrix.name }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has_unchanged == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.all_unchanged) }}
    steps:
      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Copy from previous version
        run: |
          REGISTRY="${{ needs.detect-changes.outputs.registry }}"
          NAME="${{ matrix.name }}"
          PREV="${{ needs.detect-changes.outputs.prev_version }}"
          VERSION="${{ needs.detect-changes.outputs.version }}"

          SRC="${REGISTRY}/${NAME}:${PREV}"
          DST="${REGISTRY}/${NAME}:${VERSION}"

          echo "Copying ${SRC} -> ${DST}"
          crane copy "${SRC}" "${DST}"
          echo "Done: ${DST}"

  # ===========================================================================
  # Step 5: Verify every image (list from release-config.yaml)
  # ===========================================================================
  verify:
    name: Verify All Images
    needs: [detect-changes, build-custom, pull-upstream, copy-unchanged]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          YQ_VERSION=4.44.1
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Verify all images exist and are valid amd64
        id: verify
        run: |
          REGISTRY="${{ needs.detect-changes.outputs.registry }}"
          VERSION="${{ needs.detect-changes.outputs.version }}"

          # Read image list from release-config.yaml
          mapfile -t IMAGES < <(yq '[.custom_images[].name, .upstream_images[].name] | .[]' release-config.yaml)

          PASS=0
          FAIL=0
          MANIFEST_YAML="version: ${VERSION}\nregistry: ${REGISTRY}\ngenerated: $(date -u +%Y-%m-%dT%H:%M:%SZ)\nimages:\n"

          for IMG in "${IMAGES[@]}"; do
            TAG="${REGISTRY}/${IMG}:${VERSION}"
            MANIFEST=$(crane manifest "$TAG" 2>/dev/null || echo "")
            MEDIA_TYPE=$(echo "$MANIFEST" | jq -r '.mediaType // "MISSING"')
            DIGEST=$(crane digest "$TAG" 2>/dev/null || echo "MISSING")

            if [[ "$DIGEST" == "MISSING" || -z "$MANIFEST" ]]; then
              echo "  FAIL: ${IMG} -- not found"
              MANIFEST_YAML+="  - name: ${IMG}\n    digest: MISSING\n    status: missing\n"
              FAIL=$((FAIL + 1))
            elif [[ "$MEDIA_TYPE" == *"index"* ]]; then
              # OCI index: check it has an amd64 manifest and no attestations
              AMD64_COUNT=$(echo "$MANIFEST" | jq '[.manifests[] | select(.platform.architecture == "amd64" and .platform.os == "linux")] | length')
              ATTEST_COUNT=$(echo "$MANIFEST" | jq '[.manifests[] | select(.annotations["vnd.docker.reference.type"] == "attestation-manifest")] | length')
              TOTAL_COUNT=$(echo "$MANIFEST" | jq '.manifests | length')

              if [[ "$AMD64_COUNT" -ge 1 && "$ATTEST_COUNT" -eq 0 ]]; then
                echo "  OK: ${IMG} (index, ${TOTAL_COUNT} entry, amd64, ${DIGEST:0:20}...)"
                MANIFEST_YAML+="  - name: ${IMG}\n    digest: ${DIGEST}\n    status: ok\n"
                PASS=$((PASS + 1))
              else
                echo "  FAIL: ${IMG} -- index with ${AMD64_COUNT} amd64, ${ATTEST_COUNT} attestations"
                MANIFEST_YAML+="  - name: ${IMG}\n    digest: ${DIGEST}\n    status: bad-index\n"
                FAIL=$((FAIL + 1))
              fi
            elif [[ "$MEDIA_TYPE" == "application/vnd.oci.image.manifest.v1+json" || "$MEDIA_TYPE" == "application/vnd.docker.distribution.manifest.v2+json" ]]; then
              echo "  OK: ${IMG} (single-arch, ${DIGEST:0:20}...)"
              MANIFEST_YAML+="  - name: ${IMG}\n    digest: ${DIGEST}\n    status: ok\n"
              PASS=$((PASS + 1))
            else
              echo "  FAIL: ${IMG} -- ${MEDIA_TYPE}"
              MANIFEST_YAML+="  - name: ${IMG}\n    digest: MISSING\n    status: unknown\n"
              FAIL=$((FAIL + 1))
            fi
          done

          echo ""
          echo "Results: ${PASS} passed, ${FAIL} failed, ${#IMAGES[@]} total"

          # Save manifest for later steps
          echo -e "$MANIFEST_YAML" > /tmp/manifest.yaml

          echo "pass=$PASS" >> $GITHUB_OUTPUT
          echo "fail=$FAIL" >> $GITHUB_OUTPUT
          echo "total=${#IMAGES[@]}" >> $GITHUB_OUTPUT

          if [[ "$FAIL" -gt 0 ]]; then
            echo "::error::${FAIL} images failed verification"
            exit 1
          fi

      - name: Upload manifest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: image-manifest-${{ needs.detect-changes.outputs.version }}
          path: /tmp/manifest.yaml

      - name: Summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Verification: ${{ steps.verify.outputs.pass }}/${{ steps.verify.outputs.total }} passed" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.verify.outputs.fail }}" -gt 0 ]]; then
            echo "**${{ steps.verify.outputs.fail }} images FAILED verification.**" >> $GITHUB_STEP_SUMMARY
          fi

  # ===========================================================================
  # Step 6: Cleanup old versions (keep current + previous only)
  # ===========================================================================
  cleanup:
    name: Cleanup Old Versions
    needs: [detect-changes, verify]
    if: needs.verify.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          YQ_VERSION=4.44.1
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: List and clean old versions
        run: |
          REGISTRY="${{ needs.detect-changes.outputs.registry }}"
          VERSION="${{ needs.detect-changes.outputs.version }}"
          PREV="${{ needs.detect-changes.outputs.prev_version }}"

          echo "Keeping: ${VERSION}, ${PREV}"
          echo "Will delete any other version tags."
          echo ""

          # Read image list from release-config.yaml
          mapfile -t IMAGES < <(yq '[.custom_images[].name, .upstream_images[].name] | .[]' release-config.yaml)

          # Use platform-manager-api as the reference to find all version tags
          REFERENCE="${REGISTRY}/platform-manager-api"
          ALL_TAGS=$(crane ls "$REFERENCE" 2>/dev/null | grep '^v' | sort -V)

          for TAG in $ALL_TAGS; do
            if [[ "$TAG" != "$VERSION" && "$TAG" != "$PREV" && "$TAG" != "latest" ]]; then
              echo "Deleting old version: $TAG"
              for IMG in "${IMAGES[@]}"; do
                crane delete "${REGISTRY}/${IMG}:${TAG}" 2>/dev/null && echo "  deleted ${IMG}:${TAG}" || echo "  skip ${IMG}:${TAG}"
              done
            fi
          done

          echo ""
          echo "Cleanup complete. Remaining versions: ${PREV}, ${VERSION}"

  # ===========================================================================
  # Step 7: Write manifest to repo
  # ===========================================================================
  save-manifest:
    name: Save Manifest
    needs: [detect-changes, verify]
    if: needs.verify.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          YQ_VERSION=4.44.1
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Generate manifest with digests
        run: |
          REGISTRY="${{ needs.detect-changes.outputs.registry }}"
          VERSION="${{ needs.detect-changes.outputs.version }}"

          mkdir -p .github/image-manifests

          # Read image list and metadata from release-config.yaml
          mapfile -t IMAGES < <(yq '[.custom_images[].name, .upstream_images[].name] | .[]' release-config.yaml)

          MANIFEST=".github/image-manifests/${VERSION}.yml"
          {
            echo "# ES1 Platform -- Image Manifest"
            echo "# Version: ${VERSION}"
            echo "# Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "# Registry: ${REGISTRY}"
            echo "# Platform: linux/amd64"
            echo "# Source: release-config.yaml"
            echo "#"
            echo "# Each image is an independent, single-arch manifest."
            echo "# No multi-arch indexes, no attestations, no tag pointers."
            echo "version: \"${VERSION}\""
            echo "registry: \"${REGISTRY}\""
            echo "platform: \"linux/amd64\""
            echo "images:"
          } > "$MANIFEST"

          for IMG in "${IMAGES[@]}"; do
            DIGEST=$(crane digest "${REGISTRY}/${IMG}:${VERSION}" 2>/dev/null || echo "unknown")
            TYPE=$(yq ".custom_images[] | select(.name == \"${IMG}\") | .upstream_base // \"custom\"" release-config.yaml)
            if [[ -z "$TYPE" || "$TYPE" == "null" ]]; then
              SOURCE=$(yq ".upstream_images[] | select(.name == \"${IMG}\") | .source" release-config.yaml)
              TYPE="upstream: ${SOURCE}"
            fi
            echo "  - name: ${IMG}" >> "$MANIFEST"
            echo "    tag: ${VERSION}" >> "$MANIFEST"
            echo "    digest: ${DIGEST}" >> "$MANIFEST"
            echo "    build: ${TYPE}" >> "$MANIFEST"
          done

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/image-manifests/
          if ! git diff --staged --quiet; then
            git commit -m "release: image manifest for ${{ needs.detect-changes.outputs.version }}"
            git push
          fi
